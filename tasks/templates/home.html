<!DOCTYPE html>
<html>
    <head>
        <title>Tasks App</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            background: #bcbcbc;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-weight: bold;
        }

        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9fafb;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .delete {
            color: white;
            background: #dc2626;
            padding: 8px 12px;
            border-radius: 7px;
            text-decoration: none;
            font-size: 14px;
        }

        .edit {
            color: white;
            background: #16a34a;
            padding: 8px 12px;
            border-radius: 7px;
            text-decoration: none;
            font-size: 14px;
            margin-right: 6px;
        }
        .complete {
            color: white;
            background: #3a40ed;
            padding: 8px 12px;
            border-radius: 7px;
            text-decoration: none;
            font-size: 14px;
            margin-right: 6px;
        }
    
        .done {
            text-decoration: line-through;
            color: #777;
        }   
        .empty {
            text-align: center;
            color: #777;
        }
    </style>
    </head>
    <body>

        <div class="container">
            <h1>My Tasks </h1>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="title" placeholder="Enter task title">
                <button type="submit">Add</button>
            </form>

            {% for task in tasks %}
            <div class="task">
                <span class="{% if task.completed %}done{% endif %}">

                    {{ task.title }}
                </span>

                <div>
                    <a class="complete"
                        href="{% url 'complete_task' task.id %}">
                        {% if task.completed %}Undo{% else %}Complete{% endif %}
                    </a>
                    <a class="edit"
                        href="{% url 'edit_task' task.id %}">Edit</a>
                    <a class="delete"
                        href="{% url 'delete_task' task.id %}">Delete</a>
                </div>
            </div>
            {% empty %}
            <p class="empty">No tasks yet.</p>
            {% endfor %}
        </div>

    </body>
</html>
