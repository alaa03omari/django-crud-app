name: Deploy Django app

on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: Login to Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/django-crud-app:latest
      - name: Deploy to private EC2 through Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BASTION_HOST }}
          username: ubuntu
          key: ${{ secrets.BASTION_KEY }}
          script: |
            echo '${{ secrets.BASTION_KEY }}' > /tmp/bh-key.pem
             chmod 600 /tmp/bh-key.pem

             ssh -i /tmp/bh-key.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.APP_PRIVATE_IP }} "
               echo '${{ secrets.DOCKER_PASSWORD }}' | sudo docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin

               sudo docker pull ${{ secrets.DOCKER_USERNAME }}/django-crud-app:latest

               sudo docker stop django-app || true
               sudo docker rm django-app || true

               sudo docker run -d \
                 --name django-app \
                 -p 8000:8000 \
                 -e DB_NAME='${{ secrets.DB_NAME }}' \
                 -e DB_USER='${{ secrets.DB_USER }}' \
                 -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
                 -e DB_HOST='${{ secrets.DB_HOST }}' \
                 -e DB_PORT='${{ secrets.DB_PORT }}' \
                 ${{ secrets.DOCKER_USERNAME }}/django-crud-app:latest
             "

             rm -f /tmp/bh-key.pem
